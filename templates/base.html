<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}存储维护组加班申报系统{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        :root {
            --transition-fast: 0.18s ease-out;
            --oc-bg: #f5f5f7;
            --oc-panel: #ffffff;
            --oc-border: #e5e7eb;
            --oc-accent: #007aff;
            --oc-accent-soft: rgba(0, 122, 255, 0.08);
            --oc-text-main: #111827;
            --oc-text-muted: #6b7280;
            --oc-surface-subtle: #f9fafb;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #ffffff 0, #f5f5f7 60%, #e5e7eb 100%);
            color: var(--oc-text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
        }

        .oc-shell {
            max-width: 1120px;
            margin: 28px auto;
            padding: 0 16px 32px;
        }

        .oc-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .oc-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .oc-subtitle {
            font-size: 12px;
            color: var(--oc-text-muted);
        }

        .oc-header-right {
            display: flex;
            align-items: center;
        }

        .oc-badge {
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            padding: 2px 10px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--oc-text-muted);
        }

        .oc-layout {
            display: grid;
            grid-template-columns: minmax(0, 3fr) minmax(0, 2.4fr);
            gap: 18px;
        }

        @media (max-width: 960px) {
            .oc-layout {
                grid-template-columns: minmax(0, 1fr);
            }
        }

        .oc-panel {
            background: var(--oc-panel);
            border-radius: 18px;
            border: 1px solid var(--oc-border);
            box-shadow:
                0 18px 45px rgba(15, 23, 42, 0.12),
                0 0 0 1px rgba(148, 163, 184, 0.06);
            padding: 18px 20px 18px;
        }

        .oc-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .oc-panel-title {
            font-size: 17px;
            font-weight: 600;
        }

        .oc-panel-subtitle {
            font-size: 12px;
            color: var(--oc-text-muted);
        }

        label.form-label {
            font-size: 13px;
            color: var(--oc-text-muted);
            margin-bottom: 4px;
        }

        .form-control {
            background-color: var(--oc-surface-subtle);
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.8);
            color: var(--oc-text-main);
            font-size: 13px;
            padding: 7px 10px;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background-color var(--transition-fast), color var(--transition-fast);
        }

        .form-control:focus {
            border-color: var(--oc-accent);
            box-shadow: 0 0 0 1px var(--oc-accent-soft);
            background-color: #ffffff;
            color: #0f172a;
        }

        .form-text {
            color: var(--oc-text-muted);
            font-size: 11px;
        }

        .form-check-label {
            font-size: 13px;
            color: var(--oc-text-muted);
        }

        .form-check-input {
            background-color: var(--oc-surface-subtle);
            border-color: rgba(75, 85, 99, 0.9);
        }

        .form-check-input:checked {
            background-color: var(--oc-accent);
            border-color: var(--oc-accent);
        }

        .btn-primary {
            background: linear-gradient(to right, #0ea5e9, #06b6d4);
            border: none;
            border-radius: 999px;
            font-size: 13px;
            padding: 6px 18px;
        }

        .btn-primary:hover {
            background: linear-gradient(to right, #0284c7, #0891b2);
        }

        .btn-outline-secondary {
            border-radius: 999px;
            font-size: 13px;
            padding: 6px 16px;
            border-color: rgba(148, 163, 184, 0.6);
            color: var(--oc-text-muted);
        }

        table.copy-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
            background-color: var(--oc-panel);
        }

        table.copy-table th,
        table.copy-table td {
            border: 1px solid rgba(209, 213, 219, 0.9);
            padding: 5px 8px;
            white-space: nowrap;
        }

        table.copy-table thead th {
            background-color: #f3f4f6;
            font-weight: 600;
            color: #111827;
        }

        table.copy-table tbody tr:nth-child(even) {
            background-color: #f9fafb;
        }

        .oc-section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--oc-text-muted);
            margin-bottom: 6px;
        }

        .alert {
            border-radius: 10px;
            font-size: 13px;
        }

        /* 报表筛选栏：两行网格，整齐对齐 */
        .oc-filter-bar {
            background: #fafafa;
            border-radius: 12px;
            padding: 18px 20px;
            border: 1px solid #e5e7eb;
        }
        .oc-filter-grid {
            display: grid;
            grid-template-columns: 160px 160px 1fr;
            grid-template-rows: auto auto;
            align-items: end;
            gap: 16px 20px;
        }
        .oc-filter-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        .oc-filter-item.oc-filter-actions {
            justify-self: start;
        }
        .oc-filter-item.oc-filter-full {
            grid-column: 1 / -1;
        }
        .oc-filter-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--oc-text-muted);
        }
        .oc-filter-input {
            width: 100%;
            height: 38px;
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: #fff;
            box-sizing: border-box;
        }
        .oc-filter-input:focus {
            outline: none;
            border-color: var(--oc-accent);
            box-shadow: 0 0 0 2px var(--oc-accent-soft);
        }
        .oc-filter-multi {
            height: 72px;
            min-height: 72px;
            padding: 6px 12px;
        }
        .oc-filter-btn {
            height: 38px;
            padding: 0 20px;
            border-radius: 8px;
            font-size: 13px;
        }
        @media (max-width: 640px) {
            .oc-filter-grid {
                grid-template-columns: 1fr;
            }
            .oc-filter-item.oc-filter-full {
                grid-column: 1;
            }
        }

        /* 表格内链接 */
        table.copy-table a {
            color: var(--oc-accent);
            text-decoration: none;
        }
        table.copy-table a:hover {
            text-decoration: underline;
        }
        .oc-table-link-btn {
            border: none;
            background: none;
            padding: 0 0 0 8px;
            font-size: 12px;
            color: var(--oc-accent);
            cursor: pointer;
        }
        .oc-table-link-btn:hover {
            text-decoration: underline;
        }
        .oc-table-link-danger {
            color: #dc2626;
        }

        /* 按钮与链接统一感 */
        .btn-outline-secondary:hover {
            background-color: var(--oc-surface-subtle);
            color: var(--oc-text-main);
        }
        .btn-sm {
            border-radius: 8px;
        }

        /* 报表时段块 */
        .oc-period-block {
            margin-bottom: 28px;
        }
        .oc-period-block:last-child {
            margin-bottom: 0;
        }
        .oc-period-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .oc-period-badge {
            font-size: 12px;
            font-weight: 500;
            color: var(--oc-text-muted);
            background: var(--oc-surface-subtle);
            padding: 2px 8px;
            border-radius: 6px;
        }
        /* 报表：冻结状态标识 */
        .oc-badge-locked {
            font-size: 11px;
            font-weight: 500;
            color: #b45309;
            background: #fef3c7;
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .oc-badge-draft {
            font-size: 11px;
            font-weight: 500;
            color: var(--oc-text-muted);
            background: var(--oc-surface-subtle);
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }
        table.copy-table tbody tr.oc-row-locked {
            background-color: #fffbeb;
        }
        table.copy-table tbody tr.oc-row-locked:nth-child(even) {
            background-color: #fef9e7;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="oc-shell">
    <div class="oc-header">
        <div>
            <div class="oc-title">存储维护组加班申报系统</div>
            <div class="oc-subtitle">Storage Maintenance · Overtime Filing</div>
        </div>
        <div class="oc-header-right">
            <a href="{% url 'notice_list' %}" class="btn btn-outline-secondary btn-sm me-2">规则说明</a>
            <div class="oc-badge">Internal · Strict Mode</div>
        </div>
    </div>

    {% block layout %}
        {% block content %}{% endblock %}
    {% endblock %}
</div>
</body>
</html>
